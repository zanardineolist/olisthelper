<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olist Helper - Login</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <link rel="icon" href="../public/favicon_olist.png" type="image/png">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Bem-vindo ao Olist Helper</h2>
            <p>Entre com sua conta do Google para continuar</p>
            <button id="googleLoginButton" class="google-login-button">Entrar com Google</button>
        </div>
    </div>

    <script>
        document.getElementById('googleLoginButton').addEventListener('click', function() {
            window.location.href = '/api/auth/login'; // Redireciona para a rota de autenticação
        });
    </script>
</body>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f5f5f5;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
    }
    
    .login-box {
        background-color: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
    }
    
    .google-login-button {
        background-color: #4285F4;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .google-login-button:hover {
        background-color: #357AE8;
    }
</style>
</html>
